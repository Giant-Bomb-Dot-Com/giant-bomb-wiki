# Docker Compose configuration using pre-loaded database snapshot
# This provides instant startup with all data pre-loaded
services:
  db:
    build:
      context: ./docker/db-snapshot
      dockerfile: Dockerfile
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: "mariadb -uroot -p$MARIADB_ROOT_PASSWORD -e 'SELECT 1;'"
      interval: 5s
      retries: 10
      start_period: 60s
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
  local-gcs:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dev
      MINIO_ROOT_PASSWORD: test@test.com
    volumes:
      - ./data/images/gcs-local:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 5
  local-gcs-init:
    image: minio/mc
    depends_on:
      local-gcs:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set local http://local-gcs:9000 dev test@test.com && mc mb --ignore-existing local/gb-wiki-mw"
  wiki:
    extends:
      service: wiki
      file: docker-compose.yml
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      local-gcs:
        condition: service_healthy
      local-gcs-init:
        condition: service_completed_successfully
volumes:
  db-data:
  wiki-data:
  redis-data:
  local-gcs: {}
